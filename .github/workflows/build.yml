name: Unity CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      buildTarget:
        description: 'Build Target'
        required: true
        default: 'Android'
        type: choice
        options:
          - Android
          - iOS
          - Both
      buildType:
        description: 'Build Type'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Beta
          - Release

env:
  UNITY_VERSION: 2022.3.20f1
  PROJECT_PATH: FinalNumber

jobs:
  # ============================================================================
  # Build Android
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' || 
      contains(github.event.inputs.buildTarget, 'Android') || 
      contains(github.event.inputs.buildTarget, 'Both')
    outputs:
      version: ${{ steps.version.outputs.version }}
      buildNumber: ${{ steps.version.outputs.buildNumber }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-Android-${{ hashFiles('${{ env.PROJECT_PATH }}/Assets/**', '${{ env.PROJECT_PATH }}/Packages/**', '${{ env.PROJECT_PATH }}/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Generate Version
        id: version
        run: |
          # Semantic version from tag or generate from commit count
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          
          BUILD_NUM=${{ github.run_number }}
          BUILD_TYPE=${{ github.event.inputs.buildType || 'Development' }}
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "buildNumber=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "buildType=$BUILD_TYPE" >> $GITHUB_OUTPUT
          
          echo "Building version $VERSION+$BUILD_NUM ($BUILD_TYPE)"

      - name: Build Unity Project (Android)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          buildName: FinalNumber-Android
          buildMethod: FinalNumber.Editor.CommandLineBuild.BuildAndroid
          versioning: None
          customParameters: |
            -version ${{ steps.version.outputs.version }} 
            -buildNumber ${{ steps.version.outputs.buildNumber }} 
            -buildType ${{ steps.version.outputs.buildType }}

      - name: Upload Android Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinalNumber-Android-${{ steps.version.outputs.version }}
          path: |
            build/Android/*.aab
            build/Android/*.apk
          retention-days: 30

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Android Build Ready**\n\n- Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.buildNumber }}\n- Build type: ${{ steps.version.outputs.buildType }}\n- [Download artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

  # ============================================================================
  # Build iOS
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: |
      github.event_name != 'workflow_dispatch' || 
      contains(github.event.inputs.buildTarget, 'iOS') || 
      contains(github.event.inputs.buildTarget, 'Both')
    outputs:
      version: ${{ steps.version.outputs.version }}
      buildNumber: ${{ steps.version.outputs.buildNumber }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-iOS-${{ hashFiles('${{ env.PROJECT_PATH }}/Assets/**', '${{ env.PROJECT_PATH }}/Packages/**', '${{ env.PROJECT_PATH }}/ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-

      - name: Generate Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          
          BUILD_NUM=${{ github.run_number }}
          BUILD_TYPE=${{ github.event.inputs.buildType || 'Development' }}
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "buildNumber=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "buildType=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Build Unity Project (iOS)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          buildName: FinalNumber-iOS
          buildMethod: FinalNumber.Editor.CommandLineBuild.BuildiOS
          versioning: None
          customParameters: |
            -version ${{ steps.version.outputs.version }} 
            -buildNumber ${{ steps.version.outputs.buildNumber }} 
            -buildType ${{ steps.version.outputs.buildType }}

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinalNumber-iOS-${{ steps.version.outputs.version }}
          path: build/iOS/
          retention-days: 30

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **iOS Build Ready**\n\n- Version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.buildNumber }}\n- Build type: ${{ steps.version.outputs.buildType }}\n- [Download Xcode project](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n⚠️ **Note:** iOS builds require manual Xcode archiving for App Store submission.`
            });

  # ============================================================================
  # Release - Create GitHub Release for Tags
  # ============================================================================
  release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: FinalNumber-Android-${{ needs.build-android.outputs.version }}
          path: ./artifacts/android

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: FinalNumber-iOS-${{ needs.build-ios.outputs.version }}
          path: ./artifacts/ios

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION=${{ needs.build-android.outputs.version }}
          BUILD_NUM=${{ needs.build-android.outputs.buildNumber }}
          
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## Final Number v$VERSION (Build $BUILD_NUM)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Downloads" >> $GITHUB_OUTPUT
          echo "- **Android AAB**: For Google Play Store submission" >> $GITHUB_OUTPUT
          echo "- **iOS Xcode Project**: Requires manual archiving in Xcode" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_OUTPUT
          echo "- Version: $VERSION" >> $GITHUB_OUTPUT
          echo "- Build: $BUILD_NUM" >> $GITHUB_OUTPUT
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Store Submission" >> $GITHUB_OUTPUT
          echo "1. Android: Upload AAB to Google Play Console" >> $GITHUB_OUTPUT
          echo "2. iOS: Open Xcode project, archive, and upload to App Store Connect" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Final Number v${{ needs.build-android.outputs.version }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: |
            ./artifacts/android/*
            ./artifacts/ios/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Notify - Send notification on completion
  # ============================================================================
  notify:
    name: Notify Team
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Discord/Slack
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        run: |
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          
          # Determine overall status
          if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" ]]; then
            STATUS="✅ All builds successful"
            COLOR="3066993"
          elif [[ "$ANDROID_STATUS" == "failure" || "$IOS_STATUS" == "failure" ]]; then
            STATUS="❌ Build failed"
            COLOR="15158332"
          else
            STATUS="⚠️ Build partially completed"
            COLOR="16776960"
          fi
          
          # Send Discord notification
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Final Number Build Status\",
                \"description\": \"$STATUS\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Android\", \"value\": \"$ANDROID_STATUS\", \"inline\": true},
                  {\"name\": \"iOS\", \"value\": \"$IOS_STATUS\", \"inline\": true},
                  {\"name\": \"Run\", \"value\": \"[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
